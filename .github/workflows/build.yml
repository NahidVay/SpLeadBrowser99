name: Build SuperLead Browser
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP (Automatic Search)
        run: |
          # আপনার রিপোজিটরিতে থাকা যেকোনো জিপ ফাইলকে এটি খুঁজে বের করবে
          unzip -o *.zip -d .
          # ফাইলগুলো ঠিকমতো বের হয়েছে কি না তা চেক করবে
          ls -R

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build APK
        run: |
          # প্রজেক্ট বিল্ড করা শুরু হবে
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuperLead-Browser-APK
          path: app/build/outputs/apk/debug/app-debug.apk
